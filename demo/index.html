<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC FORGE 2077 — 3D Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            overflow: hidden;
            font-family: 'Courier New', monospace;
        }
        #canvas {
            display: block;
        }
        #info {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            text-align: center;
            text-shadow: 0 0 10px #00ffff;
            font-size: 14px;
            z-index: 10;
        }
        #info h1 {
            font-size: 24px;
            margin-bottom: 10px;
            letter-spacing: 4px;
        }
        #info p {
            color: #008888;
            font-size: 12px;
        }
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 10;
        }
        .btn {
            background: transparent;
            border: 1px solid #00ffff;
            color: #00ffff;
            padding: 10px 20px;
            font-family: inherit;
            font-size: 12px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s;
        }
        .btn:hover {
            background: rgba(0, 255, 255, 0.1);
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }
        .btn.active {
            background: rgba(0, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div id="controls">
        <button class="btn active" onclick="setColor('cyan')">Cyan</button>
        <button class="btn" onclick="setColor('fire')">Fire</button>
        <button class="btn" onclick="setColor('holo')">Holo</button>
        <button class="btn" onclick="toggleRotation()">Pause</button>
    </div>
    
    <div id="info">
        <h1>ARC FORGE 2077</h1>
        <p>PATRIOT × DORA INDUSTRIES | Research Prototype v2.077</p>
        <p style="margin-top: 10px; color: #004444;">Перетаскивайте для вращения | Колёсико для масштаба</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, welder, lights = [];
        let isRotating = true;
        let currentColor = 'cyan';
        let mouseX = 0, mouseY = 0;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };

        const colors = {
            cyan: { main: 0x00ffff, accent: 0x008888, glow: 0x00ffff },
            fire: { main: 0xff4400, accent: 0xcc6600, glow: 0xff6600 },
            holo: { main: 0xff00ff, accent: 0x00ff88, glow: 0x8800ff }
        };

        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 5, 15);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 0.5, 4);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setClearColor(0x000000);

            const ambientLight = new THREE.AmbientLight(0x111111);
            scene.add(ambientLight);

            const pointLight1 = new THREE.PointLight(0x00ffff, 1, 10);
            pointLight1.position.set(2, 2, 2);
            scene.add(pointLight1);
            lights.push(pointLight1);

            const pointLight2 = new THREE.PointLight(0x00ffff, 0.5, 10);
            pointLight2.position.set(-2, 1, -2);
            scene.add(pointLight2);
            lights.push(pointLight2);

            const pointLight3 = new THREE.PointLight(0x00ffff, 0.3, 10);
            pointLight3.position.set(0, -1, 2);
            scene.add(pointLight3);
            lights.push(pointLight3);

            welder = new THREE.Group();

            const bodyGeometry = new THREE.BoxGeometry(1.8, 1.2, 1);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x1a1a1a, 
                specular: 0x00ffff, 
                shininess: 30 
            });
            const body = new THREE.Mesh(bodyGeometry, bodyMaterial);
            welder.add(body);

            const frontGeometry = new THREE.BoxGeometry(0.05, 1.15, 0.95);
            const frontMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x111111, 
                specular: 0x00ffff, 
                shininess: 50 
            });
            const front = new THREE.Mesh(frontGeometry, frontMaterial);
            front.position.x = -0.925;
            welder.add(front);

            const knobGeometry = new THREE.CylinderGeometry(0.15, 0.15, 0.08, 32);
            const knobMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x222222, 
                emissive: 0x00ffff, 
                emissiveIntensity: 0.3 
            });
            const knob = new THREE.Mesh(knobGeometry, knobMaterial);
            knob.rotation.z = Math.PI / 2;
            knob.position.set(-0.95, 0.1, 0);
            welder.add(knob);

            const knobCenterGeometry = new THREE.CylinderGeometry(0.05, 0.05, 0.1, 32);
            const knobCenterMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x00ffff, 
                emissive: 0x00ffff, 
                emissiveIntensity: 0.8 
            });
            const knobCenter = new THREE.Mesh(knobCenterGeometry, knobCenterMaterial);
            knobCenter.rotation.z = Math.PI / 2;
            knobCenter.position.set(-1.0, 0.1, 0);
            welder.add(knobCenter);

            const screenGeometry = new THREE.BoxGeometry(0.02, 0.4, 0.6);
            const screenMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x001a1a, 
                emissive: 0x00ffff, 
                emissiveIntensity: 0.2,
                transparent: true,
                opacity: 0.8
            });
            const screen = new THREE.Mesh(screenGeometry, screenMaterial);
            screen.position.set(-0.94, 0.25, 0);
            welder.add(screen);

            const termGeometry = new THREE.BoxGeometry(0.02, 0.15, 0.2);
            const termMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x1a0000, 
                emissive: 0xff0044, 
                emissiveIntensity: 0.5 
            });
            const term = new THREE.Mesh(termGeometry, termMaterial);
            term.position.set(-0.94, -0.2, 0.25);
            welder.add(term);

            const termGeometry2 = new THREE.BoxGeometry(0.02, 0.15, 0.2);
            const termMaterial2 = new THREE.MeshPhongMaterial({ 
                color: 0x0a0a0a, 
                emissive: 0x00ffff, 
                emissiveIntensity: 0.5 
            });
            const term2 = new THREE.Mesh(termGeometry2, termMaterial2);
            term2.position.set(-0.94, -0.2, -0.25);
            welder.add(term2);

            const grillGeometry = new THREE.BoxGeometry(0.03, 0.5, 0.4);
            const grillMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x0a0a0a,
                wireframe: true
            });
            const grill = new THREE.Mesh(grillGeometry, grillMaterial);
            grill.position.set(-0.9, -0.35, 0);
            welder.add(grill);

            const sideGeometry = new THREE.BoxGeometry(1.7, 1.1, 0.02);
            const sideMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x111111, 
                specular: 0x00ffff, 
                shininess: 20 
            });
            const side = new THREE.Mesh(sideGeometry, sideMaterial);
            side.position.z = 0.51;
            welder.add(side);

            const logoGeometry = new THREE.BoxGeometry(0.4, 0.15, 0.01);
            const logoMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x00ffff, 
                emissive: 0x00ffff, 
                emissiveIntensity: 0.5 
            });
            const logo = new THREE.Mesh(logoGeometry, logoMaterial);
            logo.position.set(0.3, 0.35, 0.52);
            welder.add(logo);

            const modelGeometry = new THREE.BoxGeometry(0.3, 0.1, 0.01);
            const modelMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x008888, 
                emissive: 0x008888, 
                emissiveIntensity: 0.3 
            });
            const model = new THREE.Mesh(modelGeometry, modelMaterial);
            model.position.set(0.3, 0.2, 0.52);
            welder.add(model);

            const arcForgeGeometry = new THREE.BoxGeometry(0.35, 0.2, 0.01);
            const arcForgeMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x00ffff, 
                emissive: 0x00ffff, 
                emissiveIntensity: 0.6 
            });
            const arcForge = new THREE.Mesh(arcForgeGeometry, arcForgeMaterial);
            arcForge.position.set(0.3, -0.15, 0.52);
            welder.add(arcForge);

            const handleGeometry = new THREE.TorusGeometry(0.15, 0.03, 8, 32, Math.PI);
            const handleMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xff6600, 
                emissive: 0xff6600, 
                emissiveIntensity: 0.3 
            });
            
            const handle1 = new THREE.Mesh(handleGeometry, handleMaterial);
            handle1.rotation.x = Math.PI / 2;
            handle1.position.set(-0.4, 0.7, 0);
            welder.add(handle1);
            
            const handle2 = new THREE.Mesh(handleGeometry, handleMaterial);
            handle2.rotation.x = Math.PI / 2;
            handle2.position.set(0.4, 0.7, 0);
            welder.add(handle2);

            const strapGeometry = new THREE.BoxGeometry(1.2, 0.05, 0.15);
            const strapMaterial = new THREE.MeshPhongMaterial({ 
                color: 0xff6600, 
                emissive: 0xff6600, 
                emissiveIntensity: 0.2 
            });
            const strap = new THREE.Mesh(strapGeometry, strapMaterial);
            strap.position.y = 0.65;
            welder.add(strap);

            scene.add(welder);

            const gridHelper = new THREE.GridHelper(10, 20, 0x00ffff, 0x002222);
            gridHelper.position.y = -1;
            gridHelper.material.opacity = 0.3;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);

            const particleGeometry = new THREE.BufferGeometry();
            const particleCount = 100;
            const positions = new Float32Array(particleCount * 3);
            
            for (let i = 0; i < particleCount * 3; i += 3) {
                positions[i] = (Math.random() - 0.5) * 10;
                positions[i + 1] = (Math.random() - 0.5) * 10;
                positions[i + 2] = (Math.random() - 0.5) * 10;
            }
            
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const particleMaterial = new THREE.PointsMaterial({
                color: 0x00ffff,
                size: 0.02,
                transparent: true,
                opacity: 0.5
            });
            
            const particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);

            document.addEventListener('mousedown', onMouseDown);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
            document.addEventListener('wheel', onMouseWheel);
            
            window.addEventListener('resize', onWindowResize);
            
            animate();
        }

        function onMouseDown(event) {
            isDragging = true;
            previousMousePosition = { x: event.clientX, y: event.clientY };
        }

        function onMouseMove(event) {
            if (isDragging) {
                const deltaX = event.clientX - previousMousePosition.x;
                const deltaY = event.clientY - previousMousePosition.y;
                
                welder.rotation.y += deltaX * 0.01;
                welder.rotation.x += deltaY * 0.01;
                
                previousMousePosition = { x: event.clientX, y: event.clientY };
            }
        }

        function onMouseUp() {
            isDragging = false;
        }

        function onMouseWheel(event) {
            camera.position.z += event.deltaY * 0.01;
            camera.position.z = Math.max(2, Math.min(8, camera.position.z));
        }

        function setColor(color) {
            currentColor = color;
            const c = colors[color];
            
            document.querySelectorAll('.btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            
            lights.forEach(light => light.color.setHex(c.main));
            
            welder.traverse(child => {
                if (child.isMesh) {
                    if (child.material.emissive) {
                        child.material.emissive.setHex(c.glow);
                    }
                }
            });
        }

        function toggleRotation() {
            isRotating = !isRotating;
            const btn = document.querySelector('.btn:last-child');
            btn.textContent = isRotating ? 'Pause' : 'Play';
            btn.classList.toggle('active', !isRotating);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (isRotating && !isDragging) {
                welder.rotation.y += 0.005;
            }
            
            welder.position.y = Math.sin(Date.now() * 0.001) * 0.05;
            
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
